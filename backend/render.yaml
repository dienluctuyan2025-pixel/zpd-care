# Render Blueprint — Free web service cho FastAPI
# Dashboard: https://dashboard.render.com → New → Blueprint
services:
  - type: web
    name: zpd-care-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: JWT_SECRET
        generateValue: true
      - key: AUTH_DISABLED
        value: "0"
      - key: ALLOWED_ORIGINS
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: MAX_UPLOAD_MB
        value: "15"
